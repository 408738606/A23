spring.datasource.url=${DOCFUSION_DB_URL:jdbc:mysql://localhost:3306/docfusion?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DOCFUSION_DB_USERNAME:docfusion}
