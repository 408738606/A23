server.port=8080
# Extend server timeout for long table-fill calls
spring.mvc.async.request-timeout=600000

spring.datasource.url=jdbc:h2:file:./data/docfusion;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=500MB

app.knowledge-base.path=./knowledge-base
app.upload.temp-path=./uploads/temp
app.output.path=./outputs

app.llm.default-provider=openai
app.llm.openai.base-url=https://api.openai.com/v1
app.llm.openai.model=gpt-4o
app.llm.ollama.base-url=http://localhost:11434

logging.level.com.docfusion=INFO
logging.level.com.docfusion.service.TableFillService=DEBUG
